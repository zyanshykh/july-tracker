<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>July Tracker v2.0 - Core Dashboard</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="bx bx-calendar-check"></i>
                <span>July Tracker</span>
            </div>
            
            <nav class="sidebar-menu">
                <a href="#dashboard" class="nav-link active" data-target="dashboard">
                    <i class="bx bx-grid-alt"></i> <span>Dashboard</span>
                </a>
                <a href="#projects" class="nav-link" data-target="projects">
                    <i class="bx bx-task"></i> <span>Projects</span>
                </a>
                <a href="#analytics" class="nav-link" data-target="analytics">
                    <i class="bx bx-bar-chart-alt-2"></i> <span>Analytics</span>
                </a>
                <a href="#settings" class="nav-link" data-target="settings">
                    <i class="bx bx-cog"></i> <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-user-profile">
                <i class='bx bx-user-circle'></i>
                <span>Developer Mode</span>
            </div>
        </aside>

        <div class="main-layout-wrapper">
            
            <header class="main-header">
                <div class="header-info">
                    <h1 id="header-date">Loading System Date...</h1>
                    <p id="header-time">00:00:00 AM</p>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn-icon" aria-label="Toggle Theme">
                        <i class="bx bx-moon"></i>
                    </button>
                </div>
            </header>

            <main class="content-body">
                <div id="router-view">
                    </div>
            </main>

            <footer class="main-footer">
                <div class="footer-left">
                    <p>&copy; 2026 <strong>July Tracker Suite v2.0</strong>. All Rights Reserved.</p>
                </div>
                <div class="footer-right">
                    <span>Status: <span class="status-indicator-online"></span> Production</span>
                </div>
            </footer>

        </div>
    </div>

    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
